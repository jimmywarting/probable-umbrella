      <div id="join-remote-cols" class="join-col-picker" style="min-height:34px;"><span style="color:#999;font-size:11px;">${isEditing ? 'Laddar...' : 'Välj layout och nyckel först'}</span></div>
    </label>
    <div style="display:flex;flex-direction:column;gap:4px;">
      <button class="join-add-btn" id="join-add-btn">${isEditing ? 'Spara' : 'Lägg till'}</button>
      ${isEditing ? '<button class="join-cancel-btn" id="join-cancel-btn">Avbryt</button>' : ''}
    </div>
  </div>
  <div id="join-remote-preview" style="margin-top:8px;font-size:13px;color:var(--text);width:100%;"></div>
  `;
  if (isEditing) {
    html += `<input type="hidden" id="join-edit-index" value="${editIndex}">`;
  }

  // Active joins
  if (state.joins.length > 0) {
    html += `<div class="active-joins">`;
    for (let i = 0; i < state.joins.length; i++) {
      const j = state.joins[i];
      const localColMeta = localCols.find(c => c.key === j.localKey);
      const localLabel = localColMeta ? localColMeta.header : j.localKey;
      const remoteKeyMeta = j.remoteMeta?.find(x => x.propertyName === j.remoteKey);
      const remoteKeyLabel = remoteKeyMeta ? remoteKeyMeta.header : j.remoteKey;
      const colNames = j.remoteCols.map(c => {
        const m = j.remoteMeta?.find(x => x.propertyName === c);
        return m ? m.header : c;
      }).join(', ');
      html += `<div class="active-join-item ${isEditing && editIndex === i ? 'editing' : ''}">
        <span class="join-desc"><strong>${escapeHtml(j.layoutName)}</strong> on ${escapeHtml(localLabel)} = ${escapeHtml(remoteKeyLabel)}</span>
        <span class="join-cols">${escapeHtml(colNames)}</span>
        <span class="join-btns">
          <button class="join-edit-btn" data-index="${i}">Redigera</button>
          <button class="join-remove-btn" data-index="${i}">Ta bort</button>
        </span>
      </div>`;
    }
    html += `</div>`;
  }

  panel.innerHTML = html;

  // Clear any previous highlights when opening the panel
  clearLocalColumnHighlight();

  // Update the join button badge
  const joinBtn = document.getElementById('join-btn');
  joinBtn.classList.toggle('has-joins', state.joins.length > 0);

  // --- Wire up events ---

  let _remoteData = null;
  let _remoteMeta = null;
  let _remoteComponentId = null;

  const layoutSel = document.getElementById('join-layout');
  const localKeySel = document.getElementById('join-local-key');
  const remoteKeySel = document.getElementById('join-remote-key');
  const remoteColsDiv = document.getElementById('join-remote-cols');
  const addBtn = document.getElementById('join-add-btn');
  const cancelBtn = document.getElementById('join-cancel-btn');

  // Helper: load remote layout columns into the dropdowns
  async function loadRemoteCols(layoutName, preselectKey, preselectCols) {
    remoteKeySel.disabled = true;
    remoteKeySel.innerHTML = '<option value="">Laddar...</option>';
    remoteColsDiv.innerHTML = '<span style="color:#999;font-size:11px;">Laddar...</span>';
    _remoteData = null;
    _remoteMeta = null;

    if (!layoutName) {
      remoteKeySel.innerHTML = '<option value="">Ladda layout först...</option>';
      remoteColsDiv.innerHTML = '<span style="color:#999;font-size:11px;">Välj layout och nyckel först</span>';
      return;
    }

    try {
      const detail = await getLayoutDetailCached(layoutName);
      const tabs = extractTabs(detail);
      const compIds = [...new Set(tabs.map(t => t.componentId))];

      if (compIds.length === 0) {
        remoteKeySel.innerHTML = '<option value="">Ingen komponent hittades</option>';
        return;
      }

      _remoteComponentId = compIds[0];
      const { data, meta } = await loadRemoteComponent(layoutName, _remoteComponentId);
      _remoteData = data;
      _remoteMeta = meta;

      let remoteCols = [];
      if (meta && meta.length > 0) {
        remoteCols = meta.map(m => ({ key: m.propertyName, header: m.header }));
      } else if (data && data.length > 0) {
        remoteCols = Object.keys(data[0]).map(k => ({ key: k, header: k }));
      }

      remoteKeySel.disabled = false;
      remoteKeySel.innerHTML = '<option value="">Välj fjärrnyckel...</option>' +
        remoteCols.map(c => `<option value="${escapeHtml(c.key)}" ${preselectKey === c.key ? 'selected' : ''}>${escapeHtml(c.header)} (${escapeHtml(c.key)})</option>`).join('');

      const preselectSet = new Set(preselectCols || []);
      remoteColsDiv.innerHTML = remoteCols.map(c =>
        `<label><input type="checkbox" value="${escapeHtml(c.key)}" ${preselectSet.has(c.key) ? 'checked' : ''}> ${escapeHtml(c.header)} <span style="color:#999">(${escapeHtml(c.key)})</span></label>`
      ).join('');

      // Render a small preview of remote data for the selected layout
      const previewDiv = document.getElementById('join-remote-preview');
      const renderPreview = (colsToShow) => {
        if (!previewDiv) return;
        if (!_remoteData || !_remoteData.length) {
          previewDiv.innerHTML = '<div style="color:#777;font-size:12px;">Ingen exempeldata hittades</div>';
          return;
        }
        const showCols = (colsToShow && colsToShow.length) ? colsToShow : remoteCols.slice(0, Math.min(6, remoteCols.length)).map(c => c.key);
        const headers = showCols.map(k => {
          const m = _remoteMeta?.find(x => x.propertyName === k);
          return m ? m.header : k;
        });
        const rowsToShow = _remoteData.slice(0, 5);
        let ph = '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">Exempeldata från ' + escapeHtml(layoutName) + '</div>';
        ph += '<div class="preview-table-wrap" style="overflow:auto;"><table class="join-remote-preview-table" style="border-collapse:collapse;font-size:12px;width:100%">';
        ph += '<thead><tr>' + showCols.map(k => {
          const m = _remoteMeta?.find(x => x.propertyName === k);
          const label = m ? m.header : k;
          return `<th data-key="${escapeHtml(k)}" style="text-align:left;padding:6px;border-bottom:1px solid var(--border);">${escapeHtml(label)}</th>`;
        }).join('') + '</tr></thead>';
        ph += '<tbody>';
        for (const r of rowsToShow) {
          ph += '<tr>' + showCols.map(k => `<td data-key="${escapeHtml(k)}" style="padding:6px;border-bottom:1px solid var(--border);">${escapeHtml(String(r[k] ?? ''))}</td>`).join('') + '</tr>';
        }
        ph += '</tbody></table></div>';
        previewDiv.innerHTML = ph;
        // apply any active preview highlight (if remote key selected)
        try { highlightPreviewColumn(remoteKeySel.value); } catch (err) {}
      };

      // Initial preview (no cols selected -> show first few)
      renderPreview();

      // Update preview when checkboxes change
      remoteColsDiv.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => {
          const selected = [...remoteColsDiv.querySelectorAll('input[type="checkbox"]:checked')].map(i => i.value);
          renderPreview(selected.length ? selected : null);
          try { highlightPreviewColumn(remoteKeySel.value); } catch (err) {}
        });
      });

    } catch (err) {
      remoteKeySel.innerHTML = `<option value="">Fel: ${escapeHtml(err.message)}</option>`;
    }
  }

  layoutSel.addEventListener('change', () => {
    loadRemoteCols(layoutSel.value, null, null);
  });

  const isFormReady = () => {
    return layoutSel.value && localKeySel.value && remoteKeySel.value && remoteColsDiv.querySelector('input:checked');
  };



  // If editing, pre-load remote columns for the current join
  if (isEditing && editJoin) {
    _remoteData = editJoin.remoteData;
    _remoteMeta = editJoin.remoteMeta;
    _remoteComponentId = editJoin.componentId;
    loadRemoteCols(editJoin.layoutName, editJoin.remoteKey, editJoin.remoteCols);
  }

  // Highlight local column when the select gains focus / changes
  localKeySel.addEventListener('focus', () => highlightLocalColumn(localKeySel.value));
  localKeySel.addEventListener('change', () => highlightLocalColumn(localKeySel.value));
  localKeySel.addEventListener('blur', () => clearLocalColumnHighlight());
  // Highlight remote preview column when the remote key select gains focus / changes
  remoteKeySel.addEventListener('focus', () => highlightPreviewColumn(remoteKeySel.value));
  remoteKeySel.addEventListener('change', () => highlightPreviewColumn(remoteKeySel.value));
  remoteKeySel.addEventListener('blur', () => clearPreviewHighlight());

  addBtn.addEventListener('click', () => {
    if (!isFormReady()) return;
    const checkedCols = [...remoteColsDiv.querySelectorAll('input:checked')].map(cb => cb.value);
    const join = {
      layoutName: layoutSel.value,
      componentId: _remoteComponentId,
      localKey: localKeySel.value,
      remoteKey: remoteKeySel.value,
      remoteCols: checkedCols,
      remoteData: _remoteData,
      remoteMeta: _remoteMeta,
    };
    if (isEditing) {
      state.joins[editIndex] = join;
    } else {
      state.joins.push(join);
    }
    renderJoinPanel(baseRows);
    renderTable(baseRows);
    // Persist join (and any new join columns) to the URL
    serializeStateToURL(false);
  });

  // Cancel edit
  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => {
      renderJoinPanel(baseRows);
    });
  }

  // Edit join buttons
  panel.querySelectorAll('.join-edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.index);
      renderJoinPanel(baseRows, idx);
    });
  });

  // Remove join buttons
  panel.querySelectorAll('.join-remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.index);
      state.joins.splice(idx, 1);
      renderJoinPanel(baseRows);
      renderTable(baseRows);
      // Persist removal to the URL (and remove join columns from order)
      serializeStateToURL(false);
    });
  });
}

async function exportIndexedDbBackup() {
  const db = await openIdb();
  const storeNames = Array.from(db.objectStoreNames);
  const stores = {};

  for (const storeName of storeNames) {
    stores[storeName] = await new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      const keysReq = store.getAllKeys();
      const valsReq = store.getAll();
      let keys = null;
      let values = null;

      function done() {
        if (keys && values) {
          resolve({ keys, values });
        }
      }

      keysReq.onsuccess = () => { keys = keysReq.result || []; done(); };
      valsReq.onsuccess = () => { values = valsReq.result || []; done(); };
      keysReq.onerror = () => reject(keysReq.error);
      valsReq.onerror = () => reject(valsReq.error);
    });
  }

  return {
    exportedAt: new Date().toISOString(),
    database: 'rekyl_live_db',
    stores,
  };
}

async function importIndexedDbBackup(backup) {
  if (!backup || typeof backup !== 'object' || !backup.stores || typeof backup.stores !== 'object') {
    throw new Error('Ogiltigt backupformat');
  }

  const db = await openIdb();
  const targetStoreNames = Object.keys(backup.stores).filter(name => db.objectStoreNames.contains(name));
  if (targetStoreNames.length === 0) {
    throw new Error('Backupen innehåller inga kompatibla stores');
  }

  await new Promise((resolve, reject) => {
    const tx = db.transaction(targetStoreNames, 'readwrite');

    tx.onerror = () => reject(tx.error || new Error('Import transaction failed'));
    tx.onabort = () => reject(tx.error || new Error('Import transaction aborted'));
    tx.oncomplete = () => resolve(true);

    for (const storeName of targetStoreNames) {
      const storeData = backup.stores[storeName] || {};
      const values = Array.isArray(storeData.values) ? storeData.values : [];
      const keys = Array.isArray(storeData.keys) ? storeData.keys : [];

      const store = tx.objectStore(storeName);
      store.clear();

      for (let i = 0; i < values.length; i++) {
        const value = values[i];
        // kv uses explicit keys, while stores with keyPath should not pass key argument.
        if (store.keyPath == null) {
          const key = keys[i];
          if (key === undefined) {
            throw new Error(`Saknar nyckel i store ${storeName} på index ${i}`);
          }
          store.put(value, key);
        } else {
          store.put(value);
        }
      }
    }
  });

  // Refresh in-memory caches after restore to avoid stale views.
  apiCache.layouts = null;
  apiCache.details = {};
  apiCache.componentToTab = {};
}

  } catch (err) {
    console.error('Failed to restore IndexedDB backup', err);
    if (statusEl) {
      statusEl.style.display = 'inline';
      statusEl.textContent = `Restore-fel: ${err.message || err}`;
    }
  } finally {
    // Reset file input so the same file can be selected again.
    input.value = '';
  }
});

// ---- Batch assignment helpers ----
// Utilities to batch-assign resources (salesmen) to orders or projects.
// Usage examples (run in console):
// 1) const ids = await getVisibleRowIds();
// 2) const sales = await fetchSalesmenList(); // returns [{id, name}, ...]

async function getVisibleRowIds() {
  try {
    // Visible means currently rendered rows on the table page.
    const checkboxes = Array.from(document.querySelectorAll('#table-wrapper .row-checkbox'));
    return checkboxes.map(cb => cb.dataset.id).filter(Boolean);
  } catch (err) {
    console.warn('getVisibleRowIds failed', err);
    return [];
  }
}

async function fetchSalesmenList() {
  // Loads salesmanlist layout, finds first tab and returns rows
  const layoutName = 'salesmanlist';
  const detail = await getLayoutDetailCached(layoutName);
  const tabs = extractTabs(detail);
  if (!tabs || tabs.length === 0) throw new Error('No tabs found for salesmanlist');
  const tab = tabs[0];
  const { rows } = await getAllRows(tab.id, tab.componentId);
  // return array of objects { id, name }
  return (rows || []).map(r => ({ id: r.id, name: r.salesman_name || r.name || r.salesman_name }));
}

async function fetchFullProjectDetails(projectId) {
  const fetcher = (typeof globalThis.topFetch === 'function') ? globalThis.topFetch : (url, options) => fetch(url, options);
  const html = await fetcher(`https://app.rekyl.nu/8399/project.asp?embed=1&todo=fetch&id=${encodeURIComponent(projectId)}&rekylnocache=${Date.now()}`, {
    credentials: 'include'
  }).then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.text();
  });

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const form = doc.body.querySelector('form#project');
  if (!form) throw new Error(`Form #project saknas för projekt ${projectId}`);

  const project = Object.fromEntries(new FormData(form));
  project.id = Number(projectId);
  project._fetchedAt = new Date().toISOString();
  return project;
}

async function fetchFullOrderDetails(orderId) {
  const fetcher = (typeof globalThis.topFetch === 'function') ? globalThis.topFetch : (url, options) => fetch(url, options);

  }).then(res => {

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

}

async function importSelectedFullProjects(projectIds, mode, onProgress) {
  const importMode = (mode === 'update') ? 'update' : 'skip';
  const results = { saved: [], skipped: [], failed: [] };
  const total = projectIds.length;
  let done = 0;
  let idx = 0;
  let active = 0;
  const concurrency = 3;

  return await new Promise((resolve) => {
    function next() {
      if (idx >= total && active === 0) {
        resolve(results);
        return;
      }

      while (active < concurrency && idx < total) {
        const projectId = projectIds[idx++];
        active++;

        (async (currentProjectId) => {
          try {
            if (importMode === 'skip') {
              const exists = await idbHasProject(currentProjectId);
              if (exists) {
                results.skipped.push(currentProjectId);
                return;
              }
            }
            const project = await fetchFullProjectDetails(currentProjectId);
            const ok = await idbPutProject(project);
            if (!ok) throw new Error('Kunde inte spara projekt i IndexedDB');
            results.saved.push(currentProjectId);
          } catch (err) {
            results.failed.push({ id: currentProjectId, error: String(err) });
          } finally {
            done += 1;
            active--;
            try { if (typeof onProgress === 'function') onProgress(done, total, currentProjectId); } catch (err) {}
            next();
          }
        })(projectId);
      }
    }

    next();
  });
}

async function batchAssignToResource(resourceIds, opts, salesmanPrefixedId) {
  // opts: { resourcetype: number, tab: number }
  if (!Array.isArray(resourceIds)) throw new Error('resourceIds must be an array');
  if (!opts || !opts.resourcetype || !opts.tab) throw new Error('opts must contain resourcetype and tab');

  const concurrency = (opts.concurrency && Number(opts.concurrency) > 0) ? Number(opts.concurrency) : 4;
  const total = resourceIds.length;
  const results = { success: [], failed: [] };
  let idx = 0;
  let active = 0;

  const fetcher = (typeof globalThis.topFetch === 'function') ? globalThis.topFetch : (u, o) => fetch(u, o);

  return await new Promise((resolve) => {
    function next() {
      if (idx >= total && active === 0) {
        resolve(results);
        return;
      }
      while (active < concurrency && idx < total) {
        const resId = resourceIds[idx++];
        active++;
        (async (rid) => {
          try {
            const url = `https://app.rekyl.nu/8399/scheme.asp?show=schemelist&resourcetype=${encodeURIComponent(opts.resourcetype)}&resource=${encodeURIComponent(rid)}&tab=${encodeURIComponent(opts.tab)}&todo=addlistresource&id=${encodeURIComponent(salesmanPrefixedId)}`;
            const r = await fetcher(url, { credentials: 'include' });
            if (r && r.ok) {
              results.success.push({ resource: rid, status: r.status });
            } else {
              const text = r ? await r.text().catch(() => '') : '';
              results.failed.push({ resource: rid, status: r ? r.status : 'no-response', body: text });
            }
          } catch (err) {
            results.failed.push({ resource: rid, error: String(err) });
          } finally {
            active--;
            // progress callback: try to call opts._onProgress if provided
            try { if (typeof opts._onProgress === 'function') opts._onProgress(results.success.length + results.failed.length, total, rid); } catch (e) {}
            next();
          }
        })(resId);
      }
    }
    next();
  });
}

async function batchAssignSelectedToSalesman(salesmanIdNumber, opts) {
  // salesmanIdNumber: numeric id from salesmanlist (e.g. 193). opts: { resourcetype, tab }
  const pref = `0_${salesmanIdNumber}`;
  const ids = await getVisibleRowIds();
  return batchAssignToResource(ids, opts, pref);
}
